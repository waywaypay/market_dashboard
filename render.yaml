# Render blueprint — deploy with "New → Blueprint" pointing at this repo.
#
# One web service runs everything: the build compiles the dashboard and
# installs the pipeline; the start command serves the built UI, regenerates
# the artifact at boot and every BRIEF_REFRESH_MINUTES, and exposes the
# ship/refresh endpoints. No database, no disk: the artifact is recomputed,
# never persisted.
#
# Default config pulls REAL data with zero keys: RSS feeds, SEC EDGAR and
# Yahoo Finance quotes. Two sources need secrets set in the Render
# dashboard to light up — EXA_API_KEY (news search; reports "failed" in
# the rail until set) and ANTHROPIC_API_KEY (Claude classification; falls
# back to rule-based tagging until set). Set SEC_EDGAR_USER_AGENT to your
# contact info per SEC fair-access policy. Email transport has no real
# vendor yet and stays on fixtures.

services:
  - type: web
    name: pre-market-read
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd web && npm ci && npm run build
    startCommand: python -m pipeline.serve
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: NODE_VERSION
        value: "22.11.0"
      - key: BRIEF_PROVIDERS
        value: real # RSS + EDGAR + quotes pull keyless; news needs EXA_API_KEY
      - key: BRIEF_QUOTES
        value: real # Yahoo Finance chart API — no key required
      - key: BRIEF_EMAIL
        value: fixture # no real email transport yet
      - key: BRIEF_REFRESH_MINUTES
        value: "30"
      - key: SEC_EDGAR_USER_AGENT
        sync: false # set in dashboard: "yourapp/1.0 you@example.com"
      - key: EXA_API_KEY
        sync: false # set in dashboard
      - key: ANTHROPIC_API_KEY
        sync: false # set in dashboard (enables the real classifier via BRIEF_CLASSIFIER=auto)
      # Optional keyed quote tiers. Yahoo + Stooq are keyless, but a shared
      # cloud egress IP is often blocked by both; a keyed tier answers from
      # those IPs. Any one is enough (chain order FMP -> Finnhub -> AV).
      - key: FMP_KEY
        sync: false # financialmodelingprep.com — batched quote w/ volume (RVOL), 250 req/day free
      - key: FINNHUB_KEY
        sync: false # finnhub.io — per-ticker quote, 60 req/min free
      - key: ALPHAVANTAGE_API_KEY
        sync: false # alphavantage.co — GLOBAL_QUOTE, 25 req/day free (last resort)
